name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Canvo.xcodeproj
  SCHEME: Canvo
  CONFIGURATION: Debug
  DERIVED_DATA_PATH: DerivedData
  SIMULATOR_DESTINATION: platform=iOS Simulator,name=iPhone 17,arch=arm64
  XCODE_PATH: /Applications/Xcode_26.3.app

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          set -euo pipefail

          if [ ! -d "$XCODE_PATH" ]; then
            echo "Expected Xcode at $XCODE_PATH, but it was not found."
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build
        run: |
          set -euo pipefail

          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO
